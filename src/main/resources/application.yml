spring:
  datasource:
    url: jdbc:h2:mem:coindesk
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

api_url: https://kengp3.github.io/blog/coindesk.json

